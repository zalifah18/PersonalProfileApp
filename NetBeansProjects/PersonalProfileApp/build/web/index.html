<html>
    <head>
        <title>Personal Profile Form</title>
    </head>
    <body>
        <h2>Personal Profile Form</h2>
        
        <form action="ProfileServlet"
        method="post">
            
            Name: 
            <input type ="text"
        name="name"><br><br>
            
            Student ID:
            <input type="text"
        name="studentId"><br><br>
            
            Program:
            <input type="text"
        name="program"><br><br>
            
            Email:
            <input type="email"
        name="email"><br><br>
            
            Hobbies:
            <input type="text"
        name="hobbies"><br><br>
            
            Self Introduction:
            <textarea name="intro"></
        textarea><br><br

        <input type="submit" value="Submit">

        </form>
       
    </body>
</html>
